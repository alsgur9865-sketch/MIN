# 컨트리뷰션 잔디밭을 먹어치우는 스네이크 SVG를 자동 생성해 output 브랜치에 푸시
name: Generate Snake

on:
  schedule:
    # 12시간마다 갱신
    - cron: "0 */12 * * *"
  # 수동 실행 허용
  workflow_dispatch:
  # main에 푸시될 때도 갱신
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake svg (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
